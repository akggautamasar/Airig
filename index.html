<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air IG - Premium Instagram Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #fff;
        }

        .main-bg {
            /* Using the new provided image URL with a sophisticated gradient overlay */
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.7), rgba(5, 5, 5, 0.95)), 
                              url('https://image.zaw-myo.workers.dev/file/936a2b53-79d5-41f4-9075-31149ec243d9');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .loader {
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .media-preview {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%);
        }
    </style>
</head>
<body class="main-bg min-h-screen flex flex-col items-center px-4 py-8 md:py-16 selection:bg-cyan-500/30">

    <!-- Brand Header -->
    <header class="flex flex-col items-center mb-12 text-center animate-in fade-in duration-1000">
        <div class="relative mb-6">
            <div class="absolute -inset-6 bg-cyan-500/10 blur-3xl rounded-full"></div>
            <div class="relative w-28 h-28 rounded-[32px] overflow-hidden border border-white/10 shadow-2xl rotate-3 hover:rotate-0 transition-transform duration-500">
                <!-- Applied the new image as the main logo -->
                <img src="https://image.zaw-myo.workers.dev/file/936a2b53-79d5-41f4-9075-31149ec243d9" class="w-full h-full object-cover" alt="Air IG">
            </div>
        </div>
        <h1 class="text-6xl font-black tracking-tighter mb-2 italic">
            AIR <span class="text-cyan-400 font-light">IG</span>
        </h1>
        <p class="text-slate-500 text-[10px] font-bold tracking-[0.6em] uppercase opacity-80">
            Next-Gen Media extraction
        </p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-xl space-y-8 relative z-10">
        <!-- Input Form -->
        <div class="glass p-2 rounded-[32px] shadow-2xl">
            <div class="relative flex items-center">
                <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-cyan-500/40">
                    <i data-lucide="link-2" class="w-6 h-6"></i>
                </div>
                <input id="urlInput" type="text" placeholder="Paste Instagram link..." 
                    class="w-full h-16 pl-14 pr-36 rounded-[24px] bg-transparent outline-none transition-all placeholder:text-slate-700 text-lg">
                
                <button onclick="handleFetch()" id="fetchBtn"
                    class="absolute right-1.5 top-1.5 bottom-1.5 px-8 rounded-[20px] btn-gradient text-black font-extrabold transition-all active:scale-95 flex items-center gap-2 shadow-lg disabled:opacity-50">
                    <span id="btnText">FETCH</span>
                    <div id="btnLoader" class="loader hidden w-5 h-5 border-2 border-black rounded-full"></div>
                </button>
            </div>
        </div>

        <!-- Status/Error Message -->
        <div id="statusBox" class="hidden p-4 rounded-2xl glass border-cyan-500/20 text-cyan-400 flex items-center gap-3">
            <i data-lucide="info" class="w-5 h-5"></i>
            <p id="statusText" class="text-sm font-medium"></p>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="hidden glass rounded-[44px] overflow-hidden shadow-2xl media-preview animate-in slide-in-from-bottom-10 duration-700">
            <div class="relative group">
                <div class="h-80 md:h-96 w-full bg-black/40 flex items-center justify-center overflow-hidden">
                    <img id="resImg" src="" alt="Content" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" onload="this.classList.remove('opacity-0')">
                    <div id="imgPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-700">
                        <i data-lucide="image" class="w-12 h-12 mb-2"></i>
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Preview Restricted</span>
                    </div>
                </div>
                <div class="absolute top-6 left-6 px-4 py-1.5 bg-black/60 backdrop-blur-xl border border-white/10 rounded-full text-[10px] font-black tracking-widest text-cyan-400">
                    HD MEDIA SOURCE
                </div>
            </div>
            
            <div class="p-10 space-y-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div id="userAvatar" class="w-14 h-14 rounded-2xl bg-cyan-500 flex items-center justify-center font-black text-black text-2xl shadow-lg shadow-cyan-500/20"></div>
                        <div>
                            <p id="resUser" class="text-xl font-black text-white leading-none"></p>
                            <p class="text-[10px] text-cyan-500/60 uppercase tracking-widest font-bold mt-2">Authenticated User</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <p id="resCap" class="text-slate-400 text-sm leading-relaxed line-clamp-3 italic font-medium"></p>
                    
                    <div class="pt-6 border-t border-white/5">
                        <a id="downloadLink" href="#" target="_blank"
                            class="flex items-center justify-center gap-3 w-full py-5 bg-white text-black rounded-2xl font-black transition-all hover:bg-cyan-400 hover:scale-[1.02] active:scale-[0.98] shadow-2xl">
                            <i data-lucide="arrow-down-to-line" class="w-6 h-6"></i>
                            GENERATE DOWNLOAD
                        </a>
                        <div class="flex items-center justify-center gap-2 mt-6 text-slate-600">
                             <i data-lucide="shield-check" class="w-3 h-3"></i>
                             <span class="text-[9px] font-bold tracking-tighter uppercase">Verified Safe by Air IG</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto pt-20 flex flex-col items-center gap-6 opacity-30">
        <div class="h-px w-8 bg-cyan-500/50"></div>
        <p class="text-[9px] font-bold tracking-[0.8em] uppercase">Air IG Secure Cloud Systems</p>
    </footer>

    <script>
        lucide.createIcons();

        async function handleFetch() {
            const urlInput = document.getElementById('urlInput');
            const fetchBtn = document.getElementById('fetchBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            const resultCard = document.getElementById('resultCard');
            const imgPlaceholder = document.getElementById('imgPlaceholder');
            const resImg = document.getElementById('resImg');

            const url = urlInput.value.trim();
            if (!url) return;

            fetchBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            statusBox.classList.add('hidden');
            resultCard.classList.add('hidden');
            resImg.classList.add('opacity-0');

            try {
                const apiUrl = `https://airig.worksbeyondworks.workers.dev/?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "success" && data.result && data.result.length > 0) {
                    const item = data.result[0];
                    
                    resImg.src = item.video_img;
                    resImg.onerror = () => imgPlaceholder.classList.remove('hidden');

                    document.getElementById('resUser').innerText = item.username.toUpperCase();
                    document.getElementById('userAvatar').innerText = item.username.charAt(0).toUpperCase();
                    document.getElementById('resCap').innerText = item.caption || "Media description unavailable.";
                    
                    document.getElementById('downloadLink').href = item.video_url;
                    
                    resultCard.classList.remove('hidden');
                    imgPlaceholder.classList.add('hidden');
                } else {
                    throw new Error("Unable to retrieve content. Link may be private.");
                }
            } catch (err) {
                statusText.innerText = err.message;
                statusBox.classList.remove('hidden');
            } finally {
                fetchBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

```
