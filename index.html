<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air IG - Premium Instagram Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loader {
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }

        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center px-4 py-12 selection:bg-cyan-500/30 overflow-x-hidden">

    <!-- Dynamic Background Glows -->
    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-cyan-600/10 blur-[120px] rounded-full -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>

    <!-- Header -->
    <header class="flex flex-col items-center mb-12 text-center">
        <div class="relative group mb-6">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-400 to-blue-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
            <div class="relative w-20 h-20 bg-black rounded-2xl border border-white/10 flex items-center justify-center shadow-2xl">
                <i data-lucide="instagram" class="w-10 h-10 text-cyan-500"></i>
            </div>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-white/50 mb-2">
            Air IG
        </h1>
        <p class="text-slate-500 text-sm font-medium tracking-widest flex items-center justify-center gap-2 uppercase">
            <i data-lucide="shield-check" class="w-4 h-4 text-cyan-500"></i>
            Fast & Secure Downloads
        </p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-xl space-y-8">
        <!-- Input Form -->
        <div class="relative">
            <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-500">
                <i data-lucide="link" class="w-5 h-5"></i>
            </div>
            <input id="urlInput" type="text" placeholder="Paste Instagram link here..." 
                class="w-full h-[72px] pl-14 pr-36 rounded-3xl bg-white/[0.03] border border-white/10 focus:border-cyan-500/50 focus:bg-white/[0.05] focus:ring-8 focus:ring-cyan-500/5 outline-none transition-all placeholder:text-slate-600 text-lg shadow-inner">
            
            <button onclick="handleFetch()" id="fetchBtn"
                class="absolute right-2.5 top-2.5 bottom-2.5 px-8 rounded-2xl bg-white text-black hover:bg-cyan-50 font-bold transition-all active:scale-95 flex items-center gap-2 shadow-lg disabled:opacity-50">
                <span id="btnText">Fetch</span>
                <div id="btnLoader" class="loader hidden w-5 h-5 border-2 border-black rounded-full"></div>
            </button>
        </div>

        <!-- Error Alert (Hidden) -->
        <div id="errorAlert" class="hidden p-4 rounded-2xl bg-red-500/5 border border-red-500/20 text-red-400 flex items-center gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5"></i>
            <p id="errorText" class="text-sm font-medium"></p>
        </div>

        <!-- Result Card (Hidden) -->
        <div id="resultCard" class="hidden glass rounded-[32px] overflow-hidden animate-float">
            <div class="p-2">
                <img id="resImg" src="" alt="Preview" class="w-full h-72 object-cover rounded-[24px]">
            </div>
            
            <div class="p-8 pt-4 space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div id="userAvatar" class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-500 flex items-center justify-center font-bold text-white text-sm"></div>
                        <div>
                            <p id="resUser" class="text-sm font-bold text-white"></p>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Author</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1 px-3 py-1 bg-green-500/10 rounded-full">
                        <i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i>
                        <span class="text-[10px] font-bold text-green-500">READY</span>
                    </div>
                </div>

                <p id="resCap" class="text-slate-400 text-sm leading-relaxed line-clamp-2"></p>

                <div class="grid grid-cols-1 gap-3">
                    <a id="downloadLink" href="#" target="_blank"
                        class="flex items-center justify-center gap-3 w-full py-5 bg-gradient-to-r from-cyan-400 to-blue-600 rounded-2xl text-white font-bold transition-all hover:shadow-[0_0_30px_rgba(6,182,212,0.3)] active:scale-[0.98]">
                        <i data-lucide="download" class="w-5 h-5"></i>
                        Download Media
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto pt-20 flex flex-col items-center gap-4 opacity-30">
        <p class="text-[10px] font-bold tracking-[0.3em] uppercase">Air IG Engine v1.0</p>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        async function handleFetch() {
            const urlInput = document.getElementById('urlInput');
            const fetchBtn = document.getElementById('fetchBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const errorAlert = document.getElementById('errorAlert');
            const resultCard = document.getElementById('resultCard');

            const url = urlInput.value.trim();
            if (!url) return;

            // Loading UI
            fetchBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            errorAlert.classList.add('hidden');
            resultCard.classList.add('hidden');

            try {
                const apiUrl = `https://airig.worksbeyondworks.workers.dev/?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "success" && data.result.length > 0) {
                    const item = data.result[0];
                    
                    // Map Data to UI
                    document.getElementById('resImg').src = item.video_img;
                    document.getElementById('resUser').innerText = `@${item.username}`;
                    document.getElementById('userAvatar').innerText = item.username.charAt(0).toUpperCase();
                    document.getElementById('resCap').innerText = item.caption || "Instagram Media Content";
                    document.getElementById('downloadLink').href = item.video_url;

                    // Show Result
                    resultCard.classList.remove('hidden');
                } else {
                    throw new Error("Could not find media. Is the account public?");
                }
            } catch (err) {
                document.getElementById('errorText').innerText = err.message || "Failed to fetch content.";
                errorAlert.classList.remove('hidden');
            } finally {
                fetchBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
